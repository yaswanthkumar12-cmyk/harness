pipeline:
  name: one
  identifier: one
  projectIdentifier: default_project
  orgIdentifier: default

  tags: {}

  stages:

    - stage:
        name: Deploy
        identifier: deploy_stage
        type: Custom   # keeping Custom to avoid infra complexity

        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback

        spec:

          environment:
            environmentRef: default
            deployToAll: false

          infrastructure:
            infrastructureDefinition:
              type: KubernetesDirect
              spec:
                connectorRef: k8s_connector
                namespace: default

          execution:

            steps:

              # -------------------------
              # 1️⃣ Build (fix for "missing build")
              # -------------------------
              - step:
                  type: ShellScript
                  name: Build Step
                  identifier: build_step
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |
                          echo "Building application..."
                          echo "Build completed"

              # -------------------------
              # 2️⃣ Git Checkout
              # -------------------------
              - step:
                  type: ShellScript
                  name: Git Checkout
                  identifier: git_checkout
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |
                          echo "Cloning GitHub repo..."
                          echo "Repo fetched successfully"

              # -------------------------
              # 3️⃣ Vault Secrets
              # -------------------------
              - step:
                  type: ShellScript
                  name: Fetch Vault Secrets
                  identifier: vault_secrets
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |
                          echo "Connecting to Vault..."

                          USERNAME=<+secrets.getValue("product-login/username")>
                          PASSWORD=<+secrets.getValue("product-login/password")>

                          echo "Secrets fetched"

              # -------------------------
              # 4️⃣ Deploy
              # -------------------------
              - step:
                  type: ShellScript
                  name: Deploy App
                  identifier: deploy_app
                  spec:
                    shell: Bash
                    source:
                      type: Inline
                      spec:
                        script: |
                          echo "Deploying application..."

                          echo "USER=$USERNAME"
                          echo "PASS=$PASSWORD"

                          echo "Deployment successful 🚀"
