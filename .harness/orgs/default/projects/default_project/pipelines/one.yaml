pipeline:
  name: one
  identifier: one
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}

  stages:

    - stage:
        name: q
        identifier: q
        description: "IDP Deploy Stage with Vault + GitHub"
        type: Custom

        spec:
          execution:
            steps:

              # -------------------------
              # 1️⃣ GitHub Checkout (simulated)
              # -------------------------
              - step:
                  type: ShellScript
                  name: GitHub Checkout
                  identifier: git_checkout
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          echo "Cloning GitHub repo..."
                          echo "Repo: product-login"
                          echo "Code fetched successfully"

                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m

              # -------------------------
              # 2️⃣ Fetch Secrets from Vault (via Harness)
              # -------------------------
              - step:
                  type: ShellScript
                  name: Fetch Vault Secrets
                  identifier: fetch_vault
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          echo "Connecting to Vault..."

                          USERNAME=<+secrets.getValue("product-login/username")>
                          PASSWORD=<+secrets.getValue("product-login/password")>

                          echo "Secrets fetched from Vault"
                          echo "Username loaded successfully"

                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m

              # -------------------------
              # 3️⃣ Deploy Application
              # -------------------------
              - step:
                  type: ShellScript
                  name: Deploy App
                  identifier: deploy_app
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          echo "Starting deployment..."

                          echo "Deploying application to VM..."

                          echo "USER=$USERNAME"
                          echo "PASS=$PASSWORD"

                          echo "Application deployed successfully 🚀"

                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
